[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "npx prisma generate --schema=./prisma/schema.prisma",
  "npm run build"
]

# Direct node — not npm start
[start]
cmd = "node scripts/start-production.mjs"
