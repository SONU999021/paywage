[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate --schema=./prisma/schema.prisma && npm run build && npx prisma migrate deploy --schema=./prisma/schema.prisma"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[build.env]
NIXPACKS_NODE_VERSION = "20"
